<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ερωτηματολόγιο Οδοντιατρικής</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>ΕΝΟΤΗΤΑ «ΠΑΘΟΛΟΓΙΑ ΚΑΙ ΘΕΡΑΠΕΥΤΙΚΗ ΟΔΟΝΤΙΚΩΝ ΚΑΙ ΠΕΡΙΟΔΟΝΤΙΚΩΝ ΙΣΤΩΝ»</h1>
        <p>
          Μαθήματα: Οδοντική Χειρουργική, Περιοδοντολογία, Ενδοδοντολογία
        </p>
      </header>

      <section class="controls" aria-label="Ρυθμίσεις">
        <div class="row">
          <label for="dataFile">Αρχείο δεδομένων</label>
          <select id="dataFile">
            <option value="">-- Επιλέξτε αρχείο --</option>
            <option value="data/questions-data-original.js">questions-data-original.js</option>
            <option value="data/questions-data-mixed.js">questions-data-mixed.js</option>
          </select>
        </div>

        <div class="row">
          <label for="mode">Λειτουργία</label>
          <select id="mode" disabled>
            <option value="all">Προβολή όλων των ερωτήσεων</option>
            <option value="exam">Προσομοίωση εξέτασης (150 ερωτήσεις)</option>
          </select>
        </div>

        <div class="row">
          <label for="courseFilter">Μάθημα</label>
          <select id="courseFilter" disabled>
            <option value="all">Όλα τα μαθήματα</option>
            <option value="mixed">Μεικτό (Mixed)</option>
            <option value="dental_surgery">Οδοντική Χειρουργική</option>
            <option value="periodontology">Περιοδοντολογία</option>
            <option value="endodontics">Ενδοδοντολογία</option>
          </select>
        </div>

        <div class="row row-actions">
          <button id="startBtn" type="button">Εφαρμογή</button>
          <button id="resetExamBtn" type="button">Νέα κλήρωση εξέτασης</button>
        </div>

        <div class="row" id="jumpToQuestionRow" style="display: none;">
          <label for="jumpInput">Πήγαινε στην ερώτηση</label>
          <div style="display: flex; gap: 8px; flex: 1;">
            <input
              type="number"
              id="jumpInput"
              placeholder="Αριθμός ερώτησης"
              min="1"
              style="flex: 1; padding: 8px; font-size: 14px;"
            />
            <button id="jumpBtn" type="button" style="padding: 8px 16px;">Πήγαινε</button>
          </div>
          <p id="jumpMessage" style="color: #d32f2f; margin: 4px 0; font-size: 12px; display: none;"></p>
        </div>
      </section>

      <section class="summary" id="summary" aria-live="polite"></section>

      <section id="questionList" class="question-list" aria-label="Λίστα ερωτήσεων"></section>

      <div class="navigation" id="navigation" style="display: none;">
        <button id="prevBtn" type="button">← Προηγούμενη</button>
        <button id="nextBtn" type="button">Επόμενη →</button>
      </div>
    </main>

    <button id="topBtn" type="button" style="display: none;">⬆ Κορυφή</button>

    <template id="questionTemplate">
      <article class="question-card">
        <header class="question-head">
          <span class="badge"></span>
          <h2></h2>
        </header>
        <div class="choices"></div>
        <p class="feedback" aria-live="polite"></p>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
